AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for Large file upload
Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    Runtime: java21
    Architectures:
    - x86_64
Resources:
  UploadBucketDarshan:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ${AWS::StackName}-uploads
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - PUT
          - POST
          AllowedOrigins:
          - '*'
          ExposedHeaders:
          - ETag
  GetPresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetPresignedUrlFunction
      Handler: presignedurl.PreSignedUrl::handleRequest
      Environment:
        Variables:
          BUCKET_NAME:
            Ref: UploadBucketDarshan
          AWS_REGIONS:
            Ref: AWS::Region
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:ListMultipartUploadParts
          - s3:ListBucketMultipartUploads
          Resource:
          - Fn::Sub: arn:aws:s3:::${UploadBucketDarshan}/*
          - Fn::Sub: arn:aws:s3:::${UploadBucketDarshan}
      Events:
        GetUrlApi:
          Type: Api
          Properties:
            Path: /generate-url
            Method: post
    Metadata:
      SamResourceId: GetPresignedUrlFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/generate-url
  BucketName:
    Description: S3 Bucket Name
    Value:
      Ref: UploadBucketDarshan
